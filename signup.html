<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up - Timeless</title>
    <link rel="stylesheet" href="index.css" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  </head>
  <body>
    <main class="auth-page">
      <div class="auth-container">
        <header class="auth-header">
          <h2>Create your account</h2>
          <p class="small-muted">Join Timeless and explore our exclusive collection.</p>
        </header>

        <form class="auth-form" action="#" method="post">
          <input type="text" name="name" placeholder="Full name" required>
          <input type="email" name="email" placeholder="Email address" required>
          <input type="password" name="password" placeholder="Password" required minlength="8">
          <input type="password" name="password_confirm" placeholder="Confirm password" required minlength="8">

          <div class="auth-actions">
            <button type="submit" class="btn auth-cta">Sign Up</button>
          </div>

          <div class="switch-link">
            <span>Already have an account? <a href="login.html">Log in</a></span>
          </div>
        </form>
      </div>
    </main>
  </body>
</html>
