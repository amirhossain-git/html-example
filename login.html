<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Log In - Timeless</title>
    <link rel="stylesheet" href="index.css" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  </head>
  <body>
    <main class="auth-page">
      <div class="auth-container">
        <header class="auth-header">
          <h2>Welcome back</h2>
          <p class="small-muted">Log in to your Timeless account.</p>
        </header>

        <form class="auth-form" action="#" method="post">
          <input type="email" name="email" placeholder="Email address" required>
          <input type="password" name="password" placeholder="Password" required>

          <div class="auth-actions">
            <label class="small-muted"><input type="checkbox" name="remember"> Remember me</label>
            <button type="submit" class="btn auth-cta">Log In</button>
          </div>

          <div class="switch-link">
            <a href="#">Forgot password?</a>
            <div style="margin-top:8px">New here? <a href="signup.html">Create an account</a></div>
          </div>
        </form>
      </div>
    </main>
  </body>
</html>
